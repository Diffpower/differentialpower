<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .navbar { background-color: gray; padding: 10px; }
        .navbar img { height: 50px; }
        .navbar a { color: white; margin-right: 15px; text-decoration: none; }
        .contact-info { margin: 20px 0; }
        .contact-form { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="DPx_logo.png" alt="DPx Logo">
        <a href="company.html">Company</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </div>
    <div class="contact-info">
        <h1>Contact Us</h1>
        <p>Email: contact@differentialpower.com</p>
        <p>Phone: +1 234 567 8900</p>
    </div>
    <div class="contact-form">
        <h2>Get in Touch</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" required></textarea><br>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
