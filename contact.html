<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #C0C0C0;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 40px 20px 200px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 150px;
        }

        .navbar-logo {
            height: 100px;
            width: auto;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 50px;
            margin-right: auto;
            justify-content: flex-end;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            font-weight: 300;
            font-size: 25px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        /* Main Content - Empty White Space */
        .main-content {
            background-color: #ffffff;
            flex-grow: 1;
            min-height: calc(100vh - 100px);
        }

        /* Footer */
        .footer {
            background-color: #C0C0C0;
            color: black;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #EB673A;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }

            .nav-links {
                gap: 15px;
                flex-direction: column;
                margin-left: 0;
            }

            .navbar-logo {
                height: 40px;
            }
        }
    </style>
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">
        <img src="DPX_logo_recortado.png" alt="DPx Logo hola" class="navbar-logo">
        </a>
        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <!-- Contact Section -->
    <div class="contact-container">
        <h1>Let's<br>Connect</h1>

        <div class="contact-info">
            <p>Tu Dirección, Tu Ciudad, Tu País, Tu Código Postal</p>
            <p>tu-email@tuempresa.com</p>
        </div>

        <div class="social-links">
            <a href="https://linkedin.com/company/tu-empresa" class="social-card" target="_blank">
                <div class="social-card-text">
                    <h3>LinkedIn</h3>
                    <p>linkedin.com/company/tu-empresa</p>
                </div>
                <div class="social-icon">in</div>
            </a>

            <a href="https://twitter.com/tu-empresa" class="social-card" target="_blank">
                <div class="social-card-text">
                    <h3>X</h3>
                    <p>x.com/tu-empresa</p>
                </div>
                <div class="social-icon">𝕏</div>
            </a>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Differential Power (DPx). All rights reserved.</p>
    </footer>
</body>
</html>
