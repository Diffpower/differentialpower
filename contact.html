<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #C0C0C0;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 40px 20px 200px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 150px;
            border-bottom: 2px solid #EB673A;
        }

        .navbar-logo {
            height: 100px;
            width: auto;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 50px;
            margin-right: auto;
            justify-content: flex-end;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            font-weight: 300;
            font-size: 25px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        /* Contact Container */
       .contact-container {
        background-color: #2C3E50;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;        /* Cambia de center a flex-start */
        align-items: flex-start;            /* Cambia de center a flex-start */
        text-align: left;                   /* Cambia de center a left */
        padding: 100px 80px;
        }
        .contact-container h1 {
            font-size: 120px;                   /* Aumenta de 72px a 120px */
            font-weight: 300;
            margin-bottom: 40px;                /* Aumenta el espacio */
            line-height: 1.2;
            white-space: nowrap;                /* Una sola línea */
        }

         .contact-info {
            margin-bottom: 60px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 900px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: max-content 70px; /* izquierda NO se estira */
            align-items: center;
            column-gap: 10px; /* baja esto para acercar más */
            width: fit-content; /* el grid se ajusta al contenido */
          }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 44px;
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .contact-text {
            font-size: 24px;
            color: #E0E0E0;
        }

        /* mailto link */
        .contact-link {
            font-size: 24px;
            color: #E0E0E0;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .contact-link:hover {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.6);
        }

        /* LinkedIn image button */
         /* fuerza a que el botón esté al final de su columna */
          .linkedin-btn {
            justify-self: end;
            background: transparent;
            padding: 6px;        /* crea “área” para el hover naranja */
            border-radius: 8px;
          }
        
          .linkedin-btn:hover {
            background-color: rgba(235, 103, 58, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
          }

        .linkedin-btn img {
            height: 42px; /* ajusta si quieres m��s grande */
            width: auto;
            display: block;
        }

        /* Footer */
        .footer {
            background-color: #C0C0C0;
            color: black;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #EB673A;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .nav-links {
                gap: 15px;
                flex-direction: column;
                margin-left: 0;
            }

            .navbar-logo {
                height: 40px;
            }

            .contact-container {
                padding: 60px 24px;
            }

            .contact-container h1 {
                font-size: 64px;
                white-space: normal;
            }

            .contact-row {
                grid-template-columns: 1fr; /* stack */
                justify-items: start;
            }
        }
        }
    </style>
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">
        <img src="DPX_logo_recortado.png" alt="DPx Logo hola" class="navbar-logo">
        </a>
        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
     <!-- Contact Section -->
    <div class="contact-container">
        <h1>Let's<br>Connect</h1>

        <div class="contact-info">
            <!-- Address row (icon + address only) -->
            <div class="contact-row">
                <div class="contact-item">
                    <img src="Ubicacion.png" alt="Ubicación" class="contact-icon">
                    <span class="contact-text">Playa de Riazor 12, Madrid, Spain, 28042</span>
                </div>
            </div>

            <!-- Email jcobos + LinkedIn (generic link 1) -->
            <div class="contact-row">
                <div class="contact-item">
                    <img src="Email.png" alt="Email" class="contact-icon">
                    <a class="contact-link" href="mailto:jcobos@differentialpower.com">jcobos@differentialpower.com</a>
                </div>

                <a class="linkedin-btn"
                   href="https://www.linkedin.com/in/jos%C3%A9-a-cobos-54097410/"
                   target="_blank"
                   rel="noopener noreferrer"
                   aria-label="LinkedIn (jcobos)">
                    <img src="Linkedin1.png" alt="LinkedIn">
                </a>
            </div>

            <!-- Email diffpower + LinkedIn (generic link 2) -->
            <div class="contact-row">
                <div class="contact-item">
                    <img src="Email.png" alt="Email" class="contact-icon">
                    <a class="contact-link" href="mailto:diffpower@differentialpower.com">diffpower@differentialpower.com</a>
                </div>

                <a class="linkedin-btn"
                   href="https://www.linkedin.com/in/example-contact-2/"
                   target="_blank"
                   rel="noopener noreferrer"
                   aria-label="LinkedIn (diffpower)">
                    <img src="Linkedin1.png" alt="LinkedIn">
                </a>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Differential Power (DPx). All rights reserved.</p>
    </footer>
</body>
</html>
