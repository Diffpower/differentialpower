<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #C0C0C0;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 40px 20px 200px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 150px;
        }

        .navbar-logo {
            height: 100px;
            width: auto;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 50px;
            margin-right: auto;
            justify-content: flex-end;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            font-weight: 300;
            font-size: 25px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        /* Contact Container */
       .contact-container {
        background-color: #2C3E50;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;        /* Cambia de center a flex-start */
        align-items: flex-start;            /* Cambia de center a flex-start */
        text-align: left;                   /* Cambia de center a left */
        padding: 100px 80px;
        }
.contact-container h1 {
    font-size: 120px;                   /* Aumenta de 72px a 120px */
    font-weight: 300;
    margin-bottom: 40px;                /* Aumenta el espacio */
    line-height: 1.2;
    white-space: nowrap;                /* Una sola línea */
}

.contact-info {
    margin-bottom: 60px;
    text-align: left;
}

.contact-info p {
    font-size: 18px;
    margin: 15px 0;                     /* Aumenta el espacio entre líneas */
    color: #E0E0E0;
}
        .social-card {
    display: flex;
    align-items: center;
    background-color: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 20px 40px;         /* Aumenta el padding */
    text-decoration: none;
    color: white;
    transition: all 0.3s;
    min-width: 300px;           /* Aumenta el ancho mínimo */
    cursor: pointer;            /* Añade esto */
}

.social-card:hover {
    background-color: rgba(235, 103, 58, 0.3);
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);  /* Añade sombra */
}

        /* Footer */
        .footer {
            background-color: #C0C0C0;
            color: black;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #EB673A;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }

            .nav-links {
                gap: 15px;
                flex-direction: column;
                margin-left: 0;
            }

            .navbar-logo {
                height: 40px;
            }
        }
    </style>
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">
        <img src="DPX_logo_recortado.png" alt="DPx Logo hola" class="navbar-logo">
        </a>
        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <!-- Contact Section -->
    <div class="contact-container">
        <h1>Let's<br>Connect</h1>

        <div class="contact-info">
            <p>Playa de Riazor 12, Madrid, Spain, 28042</p>
            <p>jcobos@differentialpower.com</p>
            <p>diffpower@differentialpower.com</p>
        </div>

        <div class="social-links">
           <a href="https://linkedin.com/company/tu-empresa" class="social-card" target="_blank">
                <div class="social-card-text">
                <h3>LinkedIn</h3>
                <p>linkedin.com/company/tu-empresa</p>
                </div>
            <div class="social-icon">in</div>
        </a>

            <a href="https://twitter.com/tu-empresa" class="social-card" target="_blank">
                <div class="social-card-text">
                    <h3>X</h3>
                    <p>x.com/tu-empresa</p>
                </div>
                <div class="social-icon">𝕏</div>
            </a>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Differential Power (DPx). All rights reserved.</p>
    </footer>
</body>
</html>
