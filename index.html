<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Power - DPx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #404040;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 60px;
        }

        .navbar-logo {
            height: 60px;
            width: auto;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 50px;
            margin-left: auto;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        /* Main Content - Empty White Space */
        .main-content {
            background-color: #ffffff;
            flex-grow: 1;
            min-height: calc(100vh - 100px);
        }

        /* Footer */
        .footer {
            background-color: #404040;
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #EB673A;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }

            .nav-links {
                gap: 15px;
                flex-direction: column;
                margin-left: 0;
            }

            .navbar-logo {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <img src="DPX_logo.png" alt="DPx Logo hola" class="navbar-logo">
        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content - Empty White Space -->
    <div class="main-content"></div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Differential Power (DPx). All rights reserved.</p>
    </footer>
</body>
</html>
