<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Power - Next Generation Power Solutions</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* ================= NAVBAR ================= */

        .navbar {
            background: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 2px solid #EB673A;
        }

        .navbar-logo {
            height: 50px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #EB673A;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* ===== HAMBURGER BUTTON ===== */

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .menu-toggle span {
            display: block;
            width: 25px;
            height: 2px;
            background: white;
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        /* ================= HERO ================= */

        .hero {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            padding: 120px 50px 80px;
            margin-top: 70px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .hero-content {
            max-width: 1200px;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 64px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #EB673A, #FF8C42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
            max-width: 700px;
        }

        .primary-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #EB673A, #FF8C42);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        /* ================= MOBILE ================= */

        @media (max-width: 768px) {

            .navbar {
                padding: 15px 20px;
            }

            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #000;
                flex-direction: column;
                align-items: center;
                gap: 25px;
                padding: 25px 0;
                display: none;
                border-bottom: 2px solid #EB673A;
            }

            .nav-links.active {
                display: flex;
            }

            .hero {
                margin-top: 90px;
                padding: 100px 20px 60px;
                text-align: center;
            }

            .hero h1 {
                font-size: 40px;
            }
        }

        /* ===== HAMBURGER ANIMATION ===== */

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html">
            <img src="DPX_logo_recortado.png" alt="DPx Logo" class="navbar-logo">
        </a>

        <button class="menu-toggle" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Powering the <span>Next Generation</span> of AI Chips</h1>
            <p>Revolutionary power delivery solutions that redefine efficiency and performance for data centers and AI infrastructure.</p>
            <a href="contact.html" class="primary-btn">Get Started Today</a>
        </div>
    </section>

    <!-- JS -->
    <script>
        const toggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        const links = document.querySelectorAll('.nav-links a');

        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        links.forEach(link => {
            link.addEventListener('click', () => {
                toggle.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });
    </script>

</body>
</html>
