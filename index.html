<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Power - Next Generation Power Solutions</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* ================= NAVBAR ================= */

        .navbar {
            background-color: #000000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 2px solid #EB673A;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-logo {
            height: 50px;
            transition: transform 0.3s ease;
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #EB673A;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* HAMBURGER BUTTON (NEW) */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .menu-toggle span {
            display: block;
            width: 26px;
            height: 2px;
            background: white;
            margin: 6px 0;
            transition: all 0.3s ease;
        }

        /* ================= HERO ================= */

        .hero {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 50px 80px;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
        }

        .hero-content {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 72px;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .hero-text h1 span {
            background: linear-gradient(135deg, #EB673A, #FF8C42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 18px;
            color: #CCCCCC;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
        }

        .primary-btn, .secondary-btn {
            padding: 16px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            border: 2px solid #EB673A;
        }

        .primary-btn {
            background: linear-gradient(135deg, #EB673A, #FF8C42);
            color: white;
        }

        .secondary-btn {
            color: #EB673A;
        }

        /* ================= FEATURES ================= */

        .features {
            background: linear-gradient(180deg, #FFFFFF 0%, #F8F9FA 100%);
            padding: 100px 50px;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 56px;
            margin-bottom: 20px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .feature-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-top: 4px solid #EB673A;
        }

        /* ================= CTA ================= */

        .cta-section {
            background: linear-gradient(135deg, #EB673A, #FF8C42);
            padding: 80px 50px;
            text-align: center;
            color: white;
        }

        /* ================= FOOTER ================= */

        .footer {
            background-color: #000;
            color: white;
            padding: 60px 50px 30px;
            border-top: 4px solid #EB673A;
        }

        /* ================= MOBILE ONLY ================= */

        @media (max-width: 768px) {

            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #000;
                flex-direction: column;
                gap: 25px;
                padding: 25px 0;
                display: none;
                border-bottom: 2px solid #EB673A;
            }

            .nav-links.active {
                display: flex;
            }

            .hero {
                margin-top: 90px;
                padding: 100px 20px 60px;
            }

            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-text h1 {
                font-size: 40px;
            }

            .hero-buttons {
                flex-direction: column;
            }
        }

        /* hamburger animation */
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html">
        <img src="DPX_logo_recortado.png" alt="DPx Logo" class="navbar-logo">
    </a>

    <button class="menu-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>

    <ul class="nav-links">
        <li><a href="company.html">Company</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <div class="hero-text">
            <h1>Powering the <span>Next Generation</span> of AI Chips</h1>
            <p>Revolutionary power delivery solutions that redefine efficiency and performance.</p>
            <div class="hero-buttons">
                <a href="contact.html" class="primary-btn">Get Started Today</a>
                <a href="company.html" class="secondary-btn">Learn More →</a>
            </div>
        </div>
    </div>
</section>

<!-- FEATURES -->
<section class="features">
    <h2 class="section-title">Why DPx?</h2>
</section>

<!-- CTA -->
<section class="cta-section">
    <h2>Ready to Transform Your Infrastructure?</h2>
</section>

<!-- FOOTER -->
<footer class="footer">
    © 2026 Differential Power (DPx)
</footer>

<script>
    const toggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    toggle.addEventListener('click', () => {
        toggle.classList.toggle('active');
        navLinks.classList.toggle('active');
    });
</script>

</body>
</html>
