<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Power - DPx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background-color: #808080;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #EB673A;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #EB673A 0%, #d35729 100%);
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .btn-primary {
            display: inline-block;
            background-color: #3C63AB;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #2a4a8a;
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            background-color: #808080;
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #EB673A;
        }

        .footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }

            .nav-links {
                gap: 15px;
                flex-direction: column;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }

            .navbar-logo {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar - Barra gris superior con logo a la izquierda -->
    <nav class="navbar">
        <div class="logo-section">
            <img src="DPX%20logo%20short.svg" alt="DPx Logo" class="navbar-logo">
        </div>
        <ul class="nav-links">
            <li><a href="company.html">Company</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Differential Power</h1>
        <p>High-Efficiency DC-DC Power Converters for Industrial Applications</p>
        <a href="company.html" class="btn-primary">Learn More</a>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Differential Power (DPx). All rights reserved.</p>
    </footer>
</body>
</html>
